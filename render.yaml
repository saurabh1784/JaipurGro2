services:
  - type: web
    name: jaipur
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run render:start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_CLIENT
        value: postgres
      - key: DATABASE_URL
        sync: false
